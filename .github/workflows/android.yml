name: Android AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GO111MODULE: on

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # مرحله ۱: فقط نصب و راه‌اندازی gomobile
      - name: Install gomobile
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      # مرحله ۲: آماده‌سازی وابستگی‌ها و ساخت فایل AAR
      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # اضافه کردن وابستگی مورد نیاز که قبلا صحبت کردیم
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy
          
          # اجرای دستور ساخت
          gomobile bind \
            -target=android \
            -androidapi=21 \
            -o snowflake.aar .

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: snowflake-aar
          path: snowflake.aar
