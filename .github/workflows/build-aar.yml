name: Build Snowflake Android AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install gomobile (stable)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20240529-e693b95f9473
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20240529-e693b95f9473
          gomobile init

      - name: Build AAR
        run: |
          gomobile bind -androidapi=21 -target=android -o snowflake.aar .

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: snowflake-aar
          path: snowflake.aar
